version: '3.8'

services:

  # ORACLE
  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-db
    ports:
      - "1522:1521"
    environment:
      ORACLE_PASSWORD: oracle
    volumes:
      - oracle-data:/opt/oracle/oradata
    networks:
      - microservices-net

  # CONFIG SERVER
  config-server:
    build: ./config-server
    container_name: config-server
    ports:
      - "8888:8888"
    networks:
      - microservices-net

  # EUREKA SERVER
  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    depends_on:
      - config-server
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
    networks:
      - microservices-net

  # MENTOR SERVICE
  mentor-service:
    build: ./mentor-service
    container_name: mentor-service
    ports:
      - "7073:7073"
    depends_on:
      - config-server
      - eureka-server
      - oracle-db
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
    networks:
      - microservices-net

volumes:
  oracle-data:

networks:
  microservices-net:
    driver: bridge